services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: documents
      POSTGRES_USER: documents
      POSTGRES_PASSWORD: documents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg2://documents:documents@postgres:5432/documents
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/uploads
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app
      - backend_storage:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --pool=solo
    environment:
      DATABASE_URL: postgresql+psycopg2://documents:documents@postgres:5432/documents
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/uploads
    volumes:
      - ./backend:/app
      - backend_storage:/data/uploads
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  backend_storage:
